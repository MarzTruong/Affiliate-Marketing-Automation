<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok OAuth Callback — Affiliate Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 48px 40px; max-width: 480px; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: #fff; }
    p { color: #888; line-height: 1.7; font-size: 0.95rem; }
    .code { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; margin-top: 20px; font-family: monospace; font-size: 0.85rem; color: #aaa; word-break: break-all; text-align: left; }
    .status { display: inline-block; background: #0d3b1e; color: #4ade80; border-radius: 20px; padding: 4px 14px; font-size: 0.8rem; margin-top: 16px; }
  </style>
  <script>
    // Display OAuth parameters from URL for debugging
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const codeEl = document.getElementById('params');
      if (params.toString()) {
        codeEl.textContent = window.location.search;
      } else {
        codeEl.textContent = '(No parameters — this page is the OAuth redirect endpoint)';
      }
    };
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Authorization Complete</h1>
    <p>This is the OAuth 2.0 callback endpoint for Affiliate Automation. After TikTok authorization, users are redirected here and the authorization code is processed by the application backend.</p>
    <div class="code" id="params">(loading...)</div>
    <div class="status">TikTok Login Kit · OAuth 2.0</div>
  </div>
</body>
</html>
